<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensara Health</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --void:#C4C9D0;
    --void-2:#F4F5F6;
    --ash:#7C828C;
    --ash-dim:#B9BEC6;
    --bone:#3A3E45;
    --signal:#C0392B;
    --hair:rgba(120,130,145,0.14);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{color-scheme:light;}

  html,body{height:100%;}

  body{
    background:var(--void);
    color:var(--bone);
    font-family:'IBM Plex Mono',monospace;
    overflow:hidden;
    position:relative;
    -webkit-font-smoothing:antialiased;
  }

  /* the signal canvas — a flat line that, far right, begins to rise */
  #signal{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
  }

  .vignette{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:radial-gradient(
      ellipse 92% 78% at 50% 44%,
      #FFFFFF 0%,
      #FFFFFF 30%,
      #ECEEF1 52%,
      #D8DCE2 72%,
      rgba(196,201,208,0) 100%
    );
  }

  .frame{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:clamp(1.6rem,4vw,3.2rem);
  }

  /* top row */
  .top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    opacity:0;
    animation:fade 1.4s ease 0.3s forwards;
  }
  .mark{
    font-family:'Newsreader',serif;
    font-weight:300;
    font-size:clamp(1.3rem,2.4vw,1.7rem);
    letter-spacing:0.42em;
    text-indent:0.42em;
    color:var(--bone);
  }

  /* center thesis */
  .center{
    max-width:560px;
    opacity:0;
    animation:fade 1.6s ease 1.1s forwards;
  }
  .line{
    font-family:'Newsreader',serif;
    font-weight:300;
    font-size:clamp(1.5rem,4vw,2.6rem);
    line-height:1.32;
    color:var(--bone);
    letter-spacing:-0.005em;
  }
  .line .em{
    color:var(--signal);
    font-weight:400;
  }
  .sub{
    margin-top:1.6rem;
    font-size:0.74rem;
    letter-spacing:0.16em;
    line-height:1.9;
    color:var(--ash);
    text-transform:uppercase;
    max-width:380px;
  }

  /* bottom row */
  .bottom{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:1rem;
    opacity:0;
    animation:fade 1.4s ease 1.7s forwards;
  }
  .status{
    display:flex;
    align-items:center;
    gap:0.6rem;
    font-size:0.64rem;
    letter-spacing:0.22em;
    color:var(--ash);
    text-transform:uppercase;
  }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--signal);
    box-shadow:0 0 0 0 rgba(216,65,47,0.55);
    animation:pulse 2.8s ease-out infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(216,65,47,0.5);}
    70%{box-shadow:0 0 0 9px rgba(216,65,47,0);}
    100%{box-shadow:0 0 0 0 rgba(216,65,47,0);}
  }

  .access{
    text-align:right;
    font-size:0.64rem;
    letter-spacing:0.2em;
    color:var(--ash);
    text-transform:uppercase;
    line-height:2;
  }
  .access a{
    color:var(--bone);
    text-decoration:none;
    border-bottom:1px solid var(--ash-dim);
    padding-bottom:2px;
    transition:border-color .3s, color .3s;
  }
  .access a:hover, .access a:focus-visible{
    color:var(--signal);
    border-color:var(--signal);
    outline:none;
  }

  @keyframes fade{to{opacity:1;}}

  @media (max-width:560px){
    .bottom{flex-direction:column;align-items:flex-start;gap:1.2rem;}
    .access{text-align:left;}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:0.01ms !important;animation-iteration-count:1 !important;}
    .top,.center,.bottom{opacity:1;}
  }
</style>
</head>
<body>
  <canvas id="signal"></canvas>
  <div class="vignette"></div>

  <div class="frame">
    <div class="top">
      <div class="mark">SENSARA HEALTH</div>
    </div>

    <div class="center">
      <p class="line">The change begins long before<br>anything can be <span class="em">seen</span>.</p>
      <p class="sub">We are learning to read it.</p>
    </div>

    <div class="bottom">
      <div class="status">
        <span class="dot"></span>
        Reading
      </div>
      <div class="access">
        Inquire<br>
        <a href="mailto:alan@sensarahealth.com">alan@sensarahealth.com</a>
      </div>
    </div>
  </div>

<script>
(function(){
  const c = document.getElementById('signal');
  const ctx = c.getContext('2d');
  let w,h,dpr;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function size(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    w = c.width = innerWidth*dpr;
    h = c.height = innerHeight*dpr;
    c.style.width = innerWidth+'px';
    c.style.height = innerHeight+'px';
  }
  size();
  addEventListener('resize', size);

  let t = 0;

  // a long quiet baseline that, in the final stretch, lifts off the floor
  function draw(){
    ctx.clearRect(0,0,w,h);
    const midY = h*0.66;
    const startX = -w*0.05;
    const endX = w*1.05;
    const steps = 320;

    ctx.lineWidth = 1.3*dpr;
    ctx.lineJoin = 'round';

    // trace path so we can also draw a glow head at the rising tip
    let tipX=0, tipY=0;
    ctx.beginPath();
    for(let i=0;i<=steps;i++){
      const p = i/steps;
      const x = startX + (endX-startX)*p;

      // baseline micro-noise (almost flat)
      const noise = Math.sin(p*60 + t*0.6)*1.2 + Math.sin(p*23 - t*0.3)*0.8;

      // the rise: dormant until ~72%, then accelerates upward
      const onset = 0.72;
      let rise = 0;
      if(p > onset){
        const k = (p-onset)/(1-onset);
        rise = Math.pow(k, 2.4) * h*0.34;
      }
      // a faint breathing in the rising zone
      const breathe = p>onset ? Math.sin(t*0.9 + p*8)* (p-onset)*14 : 0;

      const y = midY + (noise*dpr) - (rise) - (breathe*dpr*0.4);

      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      tipX=x; tipY=y;
    }

    // gradient: ash on the flat, signal as it climbs
    const grad = ctx.createLinearGradient(startX,0,endX,0);
    grad.addColorStop(0,   'rgba(150,156,164,0.0)');
    grad.addColorStop(0.15,'rgba(150,156,164,0.6)');
    grad.addColorStop(0.72,'rgba(140,146,154,0.75)');
    grad.addColorStop(0.85,'rgba(190,80,55,0.85)');
    grad.addColorStop(1,   'rgba(192,57,43,1)');
    ctx.strokeStyle = grad;
    ctx.shadowBlur = 0;
    ctx.stroke();

    // glowing head at the tip
    ctx.beginPath();
    ctx.arc(tipX, tipY, 3.4*dpr, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(192,57,43,0.9)';
    ctx.shadowColor = 'rgba(192,57,43,0.85)';
    ctx.shadowBlur = 34*dpr;
    ctx.fill();
    ctx.shadowBlur = 14*dpr;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(tipX, tipY, 3.2*dpr, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(192,57,43,1)';
    ctx.fill();

    if(!reduce){ t += 0.016; requestAnimationFrame(draw); }
  }
  draw();
})();
</script>
</body>
</html>
